<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirpas — Табло за отзиви</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(11,11,11,0.10);
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --text-muted: #898781;
      --accent: #2a78d6;
      --success: #1baf7a;
      --warning: #eda100;
      --danger: #e34948;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141413;
        --surface: #1a1a19;
        --border: rgba(255,255,255,0.10);
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --text-muted: #898781;
        --accent: #3987e5;
        --success: #199e70;
        --warning: #c98500;
        --danger: #e66767;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .logo {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--accent); }

    .business-name {
      font-size: 13px;
      color: var(--text-muted);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .kpi-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1;
    }

    .kpi-value.accent { color: var(--accent); }
    .kpi-value.success { color: var(--success); }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .chart-wrap { position: relative; width: 100%; height: 220px; }

    .reviews-list { display: flex; flex-direction: column; gap: 12px; }

    .review-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 0.5px solid var(--border);
    }

    .review-item:last-child { border-bottom: none; padding-bottom: 0; }

    .stars {
      font-size: 14px;
      min-width: 80px;
      color: var(--warning);
    }

    .review-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .review-comment {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .review-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge.google { background: #e8f4ea; color: #1b7a3e; }
    .badge.internal { background: #fef3e2; color: #a06000; }
    .badge.qr { background: #e8eefa; color: #1a4fa0; }
    .badge.sms { background: #f0eefa; color: #5b3fa0; }

    @media (prefers-color-scheme: dark) {
      .badge.google { background: #1a3d22; color: #5dd98a; }
      .badge.internal { background: #3d2a00; color: #f0a830; }
      .badge.qr { background: #1a2a4d; color: #7aabf0; }
      .badge.sms { background: #2a1a4d; color: #b07af0; }
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-state strong {
      display: block;
      color: var(--danger);
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 14px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { background: var(--bg); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Kirpas<span>.</span></div>
      <div class="business-name" id="biz-name">Зарежда...</div>
    </div>

    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        Зарежда данните...
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const businessId = params.get('bid');

    if (!businessId) {
      document.getElementById('app').innerHTML = `
        <div class="error-state">
          <strong>Невалиден линк</strong>
          Моля свържете се с Kirpas за достъп до таблото.
        </div>`;
    } else {
      loadDashboard(businessId);
    }

    async function loadDashboard(bid) {
      try {
        const res = await fetch(`/api/airtable?business_id=${bid}`);
        if (!res.ok) throw new Error('Бизнесът не е намерен');
        const data = await res.json();
        renderDashboard(data);
      } catch (err) {
        document.getElementById('app').innerHTML = `
          <div class="error-state">
            <strong>Грешка при зареждане</strong>
            ${err.message}
          </div>`;
      }
    }

    function renderDashboard({ client, contacts }) {
      document.getElementById('biz-name').textContent = client['Business Name'] || 'Бизнес';

      const records = contacts.map(r => r.fields);
      const withRating = records.filter(r => r.Rating);
      const total = withRating.length;
      const avgRating = total > 0
        ? (withRating.reduce((s, r) => s + Number(r.Rating), 0) / total).toFixed(1)
        : '—';
      const googleCount = records.filter(r => r.Status === 'Google Review').length;
      const internalCount = records.filter(r => r.Status === 'Internal Review').length;
      const googlePct = total > 0 ? Math.round((googleCount / total) * 100) : 0;

      const ratingCounts = [1,2,3,4,5].map(n =>
        withRating.filter(r => Number(r.Rating) === n).length
      );

      const sorted = [...records].sort((a, b) => {
        const da = a['Service Date'] || a['Message Sent At'] || '';
        const db = b['Service Date'] || b['Message Sent At'] || '';
        return db.localeCompare(da);
      });

      document.getElementById('app').innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Общо отзиви</div>
            <div class="kpi-value accent">${total}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Среден рейтинг</div>
            <div class="kpi-value">${avgRating} ★</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Към Google</div>
            <div class="kpi-value success">${googlePct}%</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Вътрешни</div>
            <div class="kpi-value">${internalCount}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Разпределение на оценките</div>
          <div class="chart-wrap">
            <canvas id="ratingChart" role="img" aria-label="Стълбова диаграма на оценките от 1 до 5 звезди"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Последни отзиви</div>
          <div class="filter-row">
            <button class="filter-btn active" onclick="filterReviews('all', this)">Всички</button>
            <button class="filter-btn" onclick="filterReviews('Google Review', this)">Google</button>
            <button class="filter-btn" onclick="filterReviews('Internal Review', this)">Вътрешни</button>
          </div>
          <div class="reviews-list" id="reviews-list"></div>
        </div>
      `;

      window._allReviews = sorted;
      renderReviews(sorted);
      renderChart(ratingCounts);
    }

    function renderReviews(records) {
      const list = document.getElementById('reviews-list');
      if (!list) return;
      const filtered = records.filter(r => r.Rating || r['Internal Feedback']);
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Няма отзиви за показване</div>';
        return;
      }
      list.innerHTML = filtered.slice(0, 20).map(r => {
        const stars = '★'.repeat(Number(r.Rating) || 0) + '☆'.repeat(5 - (Number(r.Rating) || 0));
        const date = r['Service Date'] || '';
        const comment = r['Internal Feedback'] || '';
        const statusBadge = r.Status === 'Google Review'
          ? '<span class="badge google">Google</span>'
          : r.Status === 'Internal Review'
          ? '<span class="badge internal">Вътрешен</span>'
          : '';
        const sourceBadge = r.Source === 'QR'
          ? '<span class="badge qr">QR</span>'
          : r.Source === 'SMS'
          ? '<span class="badge sms">SMS</span>'
          : '';
        return `
          <div class="review-item">
            <div class="stars">${stars}</div>
            <div class="review-meta">
              ${comment ? `<div class="review-comment">${comment}</div>` : ''}
              <div class="review-date" style="display:flex;gap:6px;align-items:center;margin-top:4px;">
                ${date} ${statusBadge} ${sourceBadge}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function filterReviews(status, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = status === 'all'
        ? window._allReviews
        : window._allReviews.filter(r => r.Status === status);
      renderReviews(filtered);
    }

    function renderChart(counts) {
      const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
      const gridColor = isDark ? '#2c2c2a' : '#e1e0d9';
      const textColor = isDark ? '#898781' : '#898781';

      new Chart(document.getElementById('ratingChart'), {
        type: 'bar',
        data: {
          labels: ['1 ★', '2 ★', '3 ★', '4 ★', '5 ★'],
          datasets: [{
            data: counts,
            backgroundColor: ['#e34948','#eda100','#eda100','#1baf7a','#1baf7a'],
            borderRadius: 4,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: textColor, font: { size: 12 } },
              border: { display: false }
            },
            y: {
              beginAtZero: true,
              ticks: { color: textColor, font: { size: 12 }, stepSize: 1 },
              grid: { color: gridColor },
              border: { display: false }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
